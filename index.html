<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Electoral - UPDS</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="login-container">
        <img src="assets/img/logo-upds.png" alt="Logo UPDS" width="150">
        <h2>Comité Mixto</h2>
        <p>Ingrese sus credenciales para participar</p>
        
        <form id="loginForm">
            <input type="text" id="userId" placeholder="ID de Usuario (ej: UPDS-001)" required>
            <input type="password" id="userPass" placeholder="Contraseña" required>
            <button type="submit">Ingresar</button>
        </form>
    </div>

    <script src="assets/js/auth.js"></script>
    <script>
        // Esperamos a que todo el contenido cargue correctamente
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const id = document.getElementById('userId').value;
                const pass = document.getElementById('userPass').value;

                // Verificamos si la función existe antes de llamarla
                if (typeof validarAcceso === 'function') {
                    validarAcceso(id, pass);
                } else {
                    console.error("Error: La función validarAcceso no se encuentra en auth.js");
                    alert("Error técnico: No se pudo cargar el módulo de seguridad.");
                }
            });
        });
    </script>
</body>
</html>
